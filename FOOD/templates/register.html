<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — Food Info</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            width: 360px;
        }
        h1 { text-align: center; margin-bottom: 8px; font-size: 1.6rem; }
        .subtitle { text-align: center; color: #888; margin-bottom: 28px; font-size: 0.9rem; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; color: #555; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 18px;
            transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #4CAF50; }
        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #45a049; }
        .error {
            background: #ffebee;
            border: 1px solid #f44336;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }
        .success {
            background: #e8f5e9;
            border: 1px solid #4CAF50;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }
        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 0.88rem;
            color: #888;
        }
        .login-link a { color: #4CAF50; text-decoration: none; font-weight: bold; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🥗 Food Info</h1>
        <p class="subtitle">Créer un compte</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST">
            <label for="username">Identifiant</label>
            <input type="text" id="username" name="username" placeholder="Choisissez un identifiant" autofocus>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="Minimum 4 caractères">

            <label for="confirm">Confirmer le mot de passe</label>
            <input type="password" id="confirm" name="confirm" placeholder="Répétez le mot de passe">

            <button type="submit">Créer le compte</button>
        </form>

        <div class="login-link">
            Déjà un compte ? <a href="/login">Se connecter</a>
        </div>
    </div>
</body>
</html>
