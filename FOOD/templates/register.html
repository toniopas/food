<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — Food Info</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
            padding: 20px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .logo span { color: #aaa; font-weight: 400; }

        .card {
            background: #242424;
            border: 1px solid #333;
            padding: 36px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }
        .subtitle {
            color: #777;
            font-size: 0.88rem;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }
        input::placeholder { color: #555; }
        input:focus { outline: none; border-color: #666; }

        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #111;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        button:hover { background: #e8e8e8; }
        button:active { transform: scale(0.99); }

        .error {
            background: #2a1a1a;
            border: 1px solid #5a2a2a;
            color: #ff7070;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 0.88rem;
        }
        .success {
            background: #1a2a1a;
            border: 1px solid #2a5a2a;
            color: #70d070;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 0.88rem;
        }

        .footer-link {
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }
        .footer-link a {
            color: #ccc;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-link a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="logo">Food<span>Info</span></div>

        <div class="card">
            <h2>Créer un compte</h2>
            <p class="subtitle">Rejoignez FoodInfo en quelques secondes</p>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
            {% if success %}
                <div class="success">{{ success }}</div>
            {% endif %}

            <form method="POST">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username" placeholder="Choisissez un identifiant" autofocus>

                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Minimum 4 caractères">

                <label for="confirm">Confirmer le mot de passe</label>
                <input type="password" id="confirm" name="confirm" placeholder="Répétez le mot de passe">

                <button type="submit">Créer le compte</button>
            </form>
        </div>

        <div class="footer-link">
            Déjà un compte ? <a href="/login">Se connecter</a>
        </div>
    </div>
</body>
</html>
