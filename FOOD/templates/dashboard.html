<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Food Info</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ddd;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navbar ── */
        nav {
            background: #242424;
            border-bottom: 1px solid #333;
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .nav-logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .nav-logo span { color: #777; font-weight: 400; }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .nav-user {
            font-size: 0.85rem;
            color: #777;
        }
        .nav-logout {
            font-size: 0.82rem;
            color: #aaa;
            text-decoration: none;
            background: #333;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }
        .nav-logout:hover { background: #444; color: #fff; }

        /* ── Layout ── */
        .container {
            display: flex;
            gap: 0;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: #202020;
            border-right: 1px solid #2e2e2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid #2e2e2e;
        }
        .sidebar-header h2 {
            font-size: 0.75rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        #search {
            width: 100%;
            padding: 9px 12px;
            background: #2a2a2a;
            border: 1px solid #363636;
            border-radius: 8px;
            font-size: 0.88rem;
            color: #ddd;
            transition: border-color 0.2s;
        }
        #search::placeholder { color: #555; }
        #search:focus { outline: none; border-color: #555; }

        .food-count {
            font-size: 0.75rem;
            color: #555;
            padding: 8px 20px;
            border-bottom: 1px solid #2e2e2e;
        }
        #count-visible { color: #888; font-weight: 600; }

        #food-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }
        #food-list::-webkit-scrollbar { width: 4px; }
        #food-list::-webkit-scrollbar-track { background: transparent; }
        #food-list::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }

        #food-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 20px;
            border-bottom: 1px solid #262626;
            cursor: pointer;
            transition: background 0.15s;
        }
        #food-list li:hover { background: #2a2a2a; }
        #food-list li.active { background: #2e2e2e; border-left: 2px solid #888; }
        #food-list li.hidden { display: none; }

        #food-list li span {
            text-transform: capitalize;
            font-size: 0.88rem;
            color: #ccc;
        }
        #food-list li button {
            background: #333;
            color: #ccc;
            border: none;
            border-radius: 5px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.15s, color 0.15s;
        }
        #food-list li button:hover { background: #444; color: #fff; }

        /* ── Main panel ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .placeholder {
            text-align: center;
            color: #444;
            margin-top: 80px;
        }
        .placeholder-icon { font-size: 3rem; margin-bottom: 16px; }
        .placeholder p { font-size: 0.95rem; }

        /* Food card */
        .food-card {
            background: #242424;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 520px;
        }

        .food-card-header {
            margin-bottom: 28px;
        }
        .food-card-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            text-transform: capitalize;
            margin-bottom: 4px;
        }
        .food-card-header p {
            font-size: 0.85rem;
            color: #666;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #1e1e1e;
            border: 1px solid #2e2e2e;
            border-radius: 10px;
            padding: 16px;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }
        .stat-unit {
            font-size: 0.8rem;
            color: #555;
            font-weight: 400;
            margin-left: 3px;
        }

        .fat-row {
            background: #1e1e1e;
            border: 1px solid #2e2e2e;
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .fat-row-label {
            font-size: 0.85rem;
            color: #999;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .fat-yes { background: #3a1a1a; color: #ff7070; border: 1px solid #5a2a2a; }
        .fat-no  { background: #1a2a1a; color: #70c070; border: 1px solid #2a4a2a; }

        .loading {
            text-align: center;
            color: #555;
            margin-top: 80px;
            font-size: 0.95rem;
        }
        .error-msg {
            text-align: center;
            color: #ff7070;
            margin-top: 80px;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">Food<span>Info</span></div>
    <div class="nav-right">
        <span class="nav-user">922 aliments disponibles</span>
        <a href="/logout" class="nav-logout">Déconnexion</a>
    </div>
</nav>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Aliments</h2>
            <input type="text" id="search" placeholder="Rechercher un aliment...">
        </div>
        <div class="food-count"><span id="count-visible">922</span> résultats</div>
        <ul id="food-list">
            {% for food in foods %}
            <li data-name="{{ food }}" onclick="loadFood('{{ food }}', this)">
                <span>{{ food.replace('-', ' ') }}</span>
                <button>Voir</button>
            </li>
            {% endfor %}
        </ul>
    </div>

    <!-- Main -->
    <div class="main" id="main-panel">
        <div class="placeholder">
            <div class="placeholder-icon">🥗</div>
            <p>Sélectionnez un aliment pour voir ses informations nutritionnelles.</p>
        </div>
    </div>

</div>

<script>
    // Recherche avec compteur
    const searchInput = document.getElementById("search");
    const countEl = document.getElementById("count-visible");
    const items = document.querySelectorAll("#food-list li");

    searchInput.addEventListener("input", function () {
        const query = this.value.toLowerCase();
        let visible = 0;
        items.forEach(li => {
            const match = li.dataset.name.toLowerCase().includes(query);
            li.classList.toggle("hidden", !match);
            if (match) visible++;
        });
        countEl.textContent = visible;
    });

    // Chargement
    function loadFood(name, el) {
        // Active state
        document.querySelectorAll("#food-list li").forEach(li => li.classList.remove("active"));
        if (el) el.classList.add("active");

        const panel = document.getElementById("main-panel");
        panel.innerHTML = '<div class="loading">Chargement...</div>';

        fetch(`/api/food/${name}`)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    panel.innerHTML = `<div class="error-msg">${data.error}</div>`;
                    return;
                }
                const fatBadge = data.is_fat
                    ? '<span class="badge fat-yes">Gras (&gt;20%)</span>'
                    : '<span class="badge fat-no">Non gras</span>';

                panel.innerHTML = `
                    <div class="food-card">
                        <div class="food-card-header">
                            <h2>${data.name.replace(/-/g, ' ')}</h2>
                            <p>Valeurs nutritionnelles pour 100g</p>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="stat-label">Calories</div>
                                <div class="stat-value">${data.calories ?? '—'}<span class="stat-unit">kcal</span></div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Lipides</div>
                                <div class="stat-value">${data.fat ?? '—'}<span class="stat-unit">g</span></div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Glucides</div>
                                <div class="stat-value">${data.carbs ?? '—'}<span class="stat-unit">g</span></div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Protéines</div>
                                <div class="stat-value">${data.proteins ?? '—'}<span class="stat-unit">g</span></div>
                            </div>
                        </div>
                        <div class="fat-row">
                            <span class="fat-row-label">Teneur en graisses</span>
                            ${fatBadge}
                        </div>
                    </div>`;
            })
            .catch(() => {
                panel.innerHTML = '<div class="error-msg">Erreur de connexion.</div>';
            });
    }
</script>

</body>
</html>
